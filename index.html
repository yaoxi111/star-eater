<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000005">
  <title>吞星者 Star Eater</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- 菜单 -->
  <div id="menu" class="overlay">
    <h1 class="title">吞星者</h1>
    <p class="subtitle">STAR EATER</p>
    <p class="hint">吞噬小粒子 · 躲避大敌人 · 不断成长</p>
    <div class="difficulty-panel">
      <p class="diff-label">选择难度</p>
      <div class="diff-buttons">
        <button class="diff-btn" data-diff="easy">
          <span class="diff-name">小登</span>
          <span class="diff-desc">地狱入门</span>
        </button>
        <button class="diff-btn" data-diff="medium">
          <span class="diff-name">中登</span>
          <span class="diff-desc">噩梦开始</span>
        </button>
        <button class="diff-btn" data-diff="hard">
          <span class="diff-name">老登</span>
          <span class="diff-desc">生不如死</span>
        </button>
        <button class="diff-btn diff-btn-final" data-diff="asian">
          <span class="diff-name">亚洲</span>
          <span class="diff-desc">十死无生</span>
        </button>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="overlay hidden">
    <div id="score">0</div>
    <div id="combo" class="hidden">COMBO x1</div>
  </div>

  <!-- 游戏结束 -->
  <div id="gameover" class="overlay hidden">
    <h2>游戏结束</h2>
    <div id="final-score">0</div>
    <div id="high-score">最高分: 0</div>
    <div id="stats"></div>
    <div class="gameover-buttons">
      <button class="diff-btn go-btn" id="btn-restart">
        <span class="diff-name">再来一次</span>
      </button>
      <button class="diff-btn go-btn" id="btn-back-menu">
        <span class="diff-name">换难度</span>
      </button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/player.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
